<html lang="en">
<head>
  <meta charset="UTF-8" />

  <style>
    /* --- Design tokens --- */
    :root {
      --color-bg:           #0d0d0d;
      --color-surface:      #1a1a1a;
      --color-surface-alt:  #242424;
      --color-border:       #333333;
      --color-accent:       #4fc3f7;
      --color-accent-hover: #81d4fa;
      --color-text-primary: #f0f0f0;
      --color-text-muted:   #888888;

      --font-family:  system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-mono:    "SF Mono", "Fira Code", "Cascadia Code", ui-monospace, monospace;
      --font-size-xs: 0.75rem;
      --font-size-sm: 0.875rem;
      --font-size-md: 1rem;
      --font-size-lg: 1.5rem;
      --font-size-xl: 2rem;

      --space-xs:  0.25rem;
      --space-sm:  0.5rem;
      --space-md:  1rem;
      --space-lg:  1.5rem;
      --space-xl:  2rem;
      --space-2xl: 3rem;

      --portrait-size: 220px;
      --btn-height:    56px;
      --radius-sm:     6px;
      --radius-md:     12px;
      --radius-lg:     20px;
    }

    /* --- Reset --- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    /* --- Base --- */
    body {
      font-family: var(--font-family);
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: var(--space-xl) var(--space-md);
    }

    body.has-result {
      justify-content: flex-start;
      padding-top: var(--space-xl);
    }

    /* --- App shell --- */
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-xl);
      width: 100%;
      max-width: 400px;
      transition: gap 0.3s ease;
    }

    #app.has-result {
      gap: var(--space-sm);
    }

    /* --- Commander header (portrait + name row) --- */
    #commander-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
      width: 100%;
      transition: gap 0.3s ease;
    }

    #app.has-result #commander-header {
      flex-direction: row;
      align-items: center;
      gap: var(--space-md);
    }

    /* --- Portrait slot --- */
    #portrait-slot {
      width: var(--portrait-size);
      height: var(--portrait-size);
      border: 2px dashed var(--color-border);
      border-radius: var(--radius-md);
      background-color: var(--color-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      transition: width 0.35s ease, height 0.35s ease, border-radius 0.35s ease;
    }

    #app.has-result #portrait-slot {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-sm);
    }

    #portrait-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: inherit;
    }

    #portrait-placeholder-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: var(--color-surface-alt);
      border: 2px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-border);
      font-size: 2.5rem;
    }

    /* --- Commander name --- */
    #commander-info {
      min-height: 2.5rem;
      text-align: center;
      flex: 1;
    }

    #app.has-result #commander-info {
      text-align: left;
    }

    #app.has-result #commander-name {
      font-size: var(--font-size-lg);
    }

    #commander-name {
      font-size: var(--font-size-xl);
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    #commander-name.placeholder {
      font-size: var(--font-size-md);
      font-weight: 400;
      color: var(--color-text-muted);
    }

    /* --- Lock-in flash --- */
    @keyframes lock-in-flash {
      0%   { box-shadow: 0 0 0 3px var(--color-accent), 0 0 30px rgba(79,195,247,0.7); border-color: var(--color-accent); }
      40%  { box-shadow: 0 0 0 6px var(--color-accent), 0 0 60px rgba(79,195,247,0.9); border-color: var(--color-accent); }
      100% { box-shadow: none; border-color: var(--color-border); }
    }

    #portrait-slot.lock-in  { animation: lock-in-flash 0.7s ease-out forwards; }
    #portrait-slot.spinning img { filter: brightness(0.55); }

    /* --- Randomize button --- */
    #btn-randomize {
      width: 100%;
      height: var(--btn-height);
      background: linear-gradient(180deg, #9a5c00 0%, #5e3800 45%, #3a2200 100%);
      border: 2px solid #e09418;
      border-radius: 2px;
      box-shadow:
        0 0 0 1px #4a2800,
        0 0 16px rgba(220, 145, 20, 0.65),
        inset 0 1px 0 rgba(255, 210, 80, 0.28),
        inset 0 -1px 0 rgba(0, 0, 0, 0.5),
        inset 0 0 24px rgba(0, 0, 0, 0.25);
      color: #ffe066;
      font-family: var(--font-family);
      font-size: var(--font-size-md);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255, 200, 50, 0.65), 0 1px 3px rgba(0, 0, 0, 0.9);
      cursor: pointer;
      transition: box-shadow 0.15s ease, background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    #btn-randomize:hover {
      background: linear-gradient(180deg, #9a5c00 0%, #5e3600 45%, #3c2200 100%);
      box-shadow:
        0 0 0 1px #3a1e00,
        0 0 22px rgba(200, 130, 10, 0.75),
        inset 0 1px 0 rgba(255, 200, 60, 0.3),
        inset 0 -1px 0 rgba(0, 0, 0, 0.5),
        inset 0 0 24px rgba(0, 0, 0, 0.25);
    }

    #btn-randomize:active  { transform: scale(0.97); }
    #btn-randomize:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #app.has-result #btn-randomize {
      height: 40px;
      font-size: var(--font-size-sm);
      letter-spacing: 0.12em;
    }

    /* --- Build order --- */
    #build-order {
      width: 100%;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }

    #build-order.visible {
      opacity: 1;
      transform: none;
      pointer-events: auto;
    }

    #build-order-label {
      font-size: var(--font-size-xs);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: var(--space-sm);
    }

    #build-order-steps {
      list-style: none;
    }

    .step {
      display: flex;
      align-items: baseline;
      gap: var(--space-sm);
      padding: 0.4rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .step:last-child { border-bottom: none; }

    .step-time {
      font-family: var(--font-mono);
      font-size: var(--font-size-sm);
      color: var(--color-accent);
      min-width: 2.8rem;
      flex-shrink: 0;
    }

    .step-action {
      font-size: var(--font-size-sm);
      line-height: 1.4;
      color: var(--color-text-primary);
    }
  </style>
</head>

  <!-- ============================================================
       LOGIC
       ============================================================ -->
  <script>
    const state = { current: null };

    // DOM refs
    const elPortraitSlot  = document.getElementById("portrait-slot");
    const elPlaceholder   = document.getElementById("portrait-placeholder-icon");
    const elName          = document.getElementById("commander-name");
    const elBtn           = document.getElementById("btn-randomize");
    const elBuildOrder    = document.getElementById("build-order");
    const elBuildSteps    = document.getElementById("build-order-steps");

    // --- Render portrait + name ---
    function render(commander) {
      if (!commander) {
        elPlaceholder.hidden = false;
        const img = elPortraitSlot.querySelector("img");
        if (img) img.remove();
        elName.textContent = "Press button to pick";
        elName.className = "placeholder";
        return;
      }

      // Portrait
      elPlaceholder.hidden = !!commander.portrait;
      const existingImg = elPortraitSlot.querySelector("img");
      if (commander.portrait) {
        if (existingImg) {
          existingImg.src = commander.portrait;
          existingImg.alt = commander.name;
        } else {
          const img = document.createElement("img");
          img.src = commander.portrait;
          img.alt = commander.name;
          elPortraitSlot.appendChild(img);
        }
      } else if (existingImg) {
        existingImg.remove();
      }

      // Name
      elName.textContent = commander.name;
      elName.className = "";
    }

    // --- Build order ---
    function showBuildOrder(commander) {
      const build = commander.buildOrders?.[0];
      if (!build) return;
      elBuildSteps.innerHTML = "";
      build.steps.forEach(step => {
        const li = document.createElement("li");
        li.className = "step";
        li.innerHTML = `<span class="step-time">${step.time}</span><span class="step-action">${step.action}</span>`;
        elBuildSteps.appendChild(li);
      });
      elBuildOrder.classList.add("visible");
    }

    function hideBuildOrder() {
      elBuildOrder.classList.remove("visible");
    }

    // --- Pick logic ---
    function pickRandom() {
      let finalIndex;
      do {
        finalIndex = Math.floor(Math.random() * commanders.length);
      } while (finalIndex === state.current && commanders.length > 1);

      elBtn.disabled = true;
      hideBuildOrder();
      elPortraitSlot.classList.add("spinning");
      elPortraitSlot.classList.remove("lock-in");

      const TOTAL_MS       = 2000;
      const INTERVAL_START = 55;
      const INTERVAL_END   = 280;
      let elapsed  = 0;
      let interval = INTERVAL_START;

      function tick() {
        let tempIndex;
        do { tempIndex = Math.floor(Math.random() * commanders.length); }
        while (tempIndex === finalIndex);
        render(commanders[tempIndex]);

        elapsed += interval;
        const t = Math.min(elapsed / TOTAL_MS, 1);
        interval = INTERVAL_START + (INTERVAL_END - INTERVAL_START) * (t * t);

        if (elapsed < TOTAL_MS) {
          setTimeout(tick, interval);
        } else {
          state.current = finalIndex;
          elPortraitSlot.classList.remove("spinning");
          render(commanders[finalIndex]);
          elPortraitSlot.classList.add("lock-in");
          document.getElementById("app").classList.add("has-result");
          document.body.classList.add("has-result");
          elBtn.disabled = false;
          // Build order fades in after the lock-in flash settles
          setTimeout(() => showBuildOrder(commanders[finalIndex]), 500);
        }
      }

      tick();
    }

    // Wire up
    elBtn.addEventListener("click", pickRandom);
    document.addEventListener("keydown", e => {
      if (e.code === "Space" && !elBtn.disabled) {
        e.preventDefault();
        pickRandom();
      }
    });

    render(null);
  </script>
